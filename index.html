<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Supermercado</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; display: flex; justify-content: center; }
        .app { width: 100%; max-width: 400px; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        button { display: block; width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 8px; background: #007bff; color: white; font-weight: bold; cursor: pointer; text-align: left; }
        h2 { text-align: center; color: #333; margin-bottom: 20px; }
        .btn-voltar { background: #6c757d; text-align: center; }
        .btn-verde { background: #28a745; text-align: center; }
        .carrinho { font-size: 1.1em; color: #333; padding: 5px 0; border-bottom: 1px solid #eee; }
        .total { font-size: 1.3em; font-weight: bold; color: green; text-align: center; margin-top: 20px; border-top: 2px solid #eee; padding-top: 10px; }
    </style>
</head>
<body>

<div class="app" id="app"></div>

<script>
    const db = {
        "Hortifrúti": { "Tomate": {"M1": 5.90, "M2": 6.50}, "Cebola": {"M1": 3.50, "M2": 3.90} },
        "Açougue e Peixaria": { "Carne Moída": {"M1": 28.00, "M2": 26.50} },
        "Padaria e Confeitaria": { "Pão Francês": {"M1": 12.00, "M2": 13.50} },
        "Frios e Laticínios": { "Leite": {"M1": 4.50, "M2": 4.20} },
        "Congelados": { "Pizza": {"M1": 18.00, "M2": 17.50} },
        "Mercearia": { "Arroz": {"M1": 24.00, "M2": 25.00} },
        "Bebidas": { "Refrigerante": {"M1": 8.00, "M2": 7.50} },
        "Matinais": { "Café": {"M1": 15.00, "M2": 14.50} },
        "Higiene": { "Sabonete": {"M1": 2.50, "M2": 2.20} },
        "Limpeza": { "Detergente": {"M1": 2.00, "M2": 1.90} },
        "Bazar": { "Esponja": {"M1": 3.00, "M2": 2.80} },
        "Mundo Pet": { "Ração": {"M1": 12.00, "M2": 11.50} },
        "Infantil": { "Fralda": {"M1": 35.00, "M2": 33.00} }
    };

    let estado = { tela: 'menu', setor: '', carrinho: [] };

    function render() {
        const app = document.getElementById('app');
        app.innerHTML = '';
        if (estado.tela === 'menu') {
            app.innerHTML = '<h2>Setores</h2>';
            Object.keys(db).forEach(s => app.innerHTML += `<button onclick="ir('produtos', '${s}')">${s}</button>`);
            app.innerHTML += `<button class="btn-verde" onclick="ir('carrinho')">Ver Carrinho</button>`;
        } 
        else if (estado.tela === 'produtos') {
            app.innerHTML = `<h2>${estado.setor}</h2><button class="btn-voltar" onclick="ir('menu')">Voltar</button>`;
            Object.keys(db[estado.setor]).forEach(p => app.innerHTML += `<button onclick="ir('comparar', '${p}')">${p}</button>`);
        }
        else if (estado.tela === 'comparar') {
            app.innerHTML = `<h2>${estado.produto}</h2><button class="btn-voltar" onclick="ir('produtos', '${estado.setor}')">Voltar</button>`;
            const precos = db[estado.setor][estado.produto];
            Object.keys(precos).forEach(m => app.innerHTML += `<button onclick="add('${estado.produto}', '${m}', ${precos[m]})">${m}: R$ ${precos[m].toFixed(2)}</button>`);
        }
        else if (estado.tela === 'carrinho') {
            app.innerHTML = `<h2>Carrinho</h2><button class="btn-voltar" onclick="ir('menu')">Voltar</button>`;
            let total = 0;
            estado.carrinho.forEach(item => { total += item.preco; app.innerHTML += `<div class="carrinho">${item.prod} (${item.mercado}): R$ ${item.preco.toFixed(2)}</div>`; });
            app.innerHTML += `<div class="total">Total: R$ ${total.toFixed(2)}</div>`;
        }
    }

    function ir(tela, param) {
        if(tela === 'produtos') { estado.tela = 'produtos'; estado.setor = param; }
        else if(tela === 'comparar') { estado.tela = 'comparar'; estado.produto = param; }
        else if(tela === 'menu') { estado.tela = 'menu'; }
        else if(tela === 'carrinho') { estado.tela = 'carrinho'; }
        render();
    }

    function add(prod, mercado, preco) {
        estado.carrinho.push({prod, mercado, preco});
        alert(prod + " adicionado!");
    }
    render();
</script>
</body>
</html>
