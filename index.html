<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Estoque</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h2 { text-align: center; }
        .form-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        input { padding: 12px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 12px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; margin-top: 5px; }
        .btn-toggle { background: #007bff; width: 100%; }
        #tabelaWrapper { display: none; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <h2>Gerenciador de Estoque</h2>
    
    <div class="form-group">
        <input type="text" id="prodNome" placeholder="Nome do Produto">
        <input type="number" id="prodQtd" placeholder="Quantidade">
        <input type="date" id="prodVal">
        <button onclick="adicionarProduto()">Adicionar Produto</button>
    </div>

    <button class="btn-toggle" onclick="toggleLista()">Mostrar / Ocultar Lista</button>

    <div id="tabelaWrapper">
        <table>
            <thead>
                <tr>
                    <th>Produto</th>
                    <th>Qtd</th>
                    <th>Val</th>
                    <th>X</th>
                </tr>
            </thead>
            <tbody id="listaProdutos"></tbody>
        </table>
    </div>
</div>

<script>
    // LISTA DE PRODUTOS PARA PRÉ-CADASTRO
    const produtosIniciais = [
        { nome: 'Esfirra Carne', qtd: 50, val: '2026-05-01' },
        { nome: 'Esfirra Queijo', qtd: 30, val: '2026-05-01' },
        { nome: 'Esfirra Calabresa', qtd: 20, val: '2026-05-01' }
    ];

    // Carrega o estoque ou usa os iniciais se estiver vazio
    let produtos = JSON.parse(localStorage.getItem('estoque'));
    if (!produtos) {
        produtos = produtosIniciais;
        localStorage.setItem('estoque', JSON.stringify(produtos));
    }

    function toggleLista() {
        const div = document.getElementById('tabelaWrapper');
        div.style.display = (div.style.display === 'block') ? 'none' : 'block';
    }

    function salvar() {
        localStorage.setItem('estoque', JSON.stringify(produtos));
        renderizar();
    }

    function adicionarProduto() {
        const nome = document.getElementById('prodNome').value;
        const qtd = document.getElementById('prodQtd').value;
        const val = document.getElementById('prodVal').value;

        if (!nome || !qtd || !val) return alert("Preencha tudo!");

        produtos.push({ nome, qtd, val });
        salvar();
        // Limpa campos
        document.getElementById('prodNome').value = '';
        document.getElementById('prodQtd').value = '';
        document.getElementById('prodVal').value = '';
    }

    function removerProduto(index) {
        produtos.splice(index, 1);
        salvar();
    }

    function renderizar() {
        const tbody = document.getElementById('listaProdutos');
        tbody.innerHTML = '';
        produtos.forEach((p, index) => {
            tbody.innerHTML += `
                <tr>
                    <td>${p.nome}</td>
                    <td>${p.qtd}</td>
                    <td>${p.val}</td>
                    <td><button onclick="removerProduto(${index})" style="background:red; padding: 5px;">X</button></td>
                </tr>
            `;
        });
    }

    renderizar();
</script>

</body>
</html>
