<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MercadoFácil Pro</title>
    <style>
        :root {
            --primary: #ffcc00;
            --bg: #000000;
            --card: #121212;
            --surface: #1e1e1e;
            --text: #ffffff;
            --text-secondary: #a0a0a0;
            --success: #25d366;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', -apple-system, sans-serif; }
        
        body { background-color: #f5f5f5; display: flex; justify-content: center; height: 100vh; overflow: hidden; }

        .app-container {
            width: 100%;
            max-width: 430px;
            height: 100%;
            background: var(--bg);
            color: var(--text);
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 40px rgba(0,0,0,0.3);
        }

        /* Telas */
        .screen {
            display: none;
            flex-direction: column;
            height: 100%;
            padding: 24px;
            animation: fadeIn 0.3s ease-out;
            overflow-y: auto;
        }
        .screen.active { display: flex; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Componentes Estilo Uber */
        .header { padding: 40px 0; text-align: left; }
        .logo-mark { background: var(--primary); width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; color: #000; margin-bottom: 20px; }
        
        h1 { font-size: 32px; font-weight: 800; letter-spacing: -1px; margin-bottom: 8px; }
        h2 { font-size: 20px; font-weight: 700; margin-bottom: 16px; }

        .input-group { margin-bottom: 16px; }
        .input-group label { display: block; font-size: 12px; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 8px; font-weight: 600; }
        input { width: 100%; background: var(--card); border: 1px solid #333; padding: 16px; border-radius: 12px; color: #fff; font-size: 16px; transition: 0.3s; }
        input:focus { border-color: var(--primary); outline: none; }

        .btn {
            background: var(--primary);
            color: #000;
            padding: 18px;
            border-radius: 14px;
            border: none;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            transition: 0.2s;
        }
        .btn:active { transform: scale(0.98); }
        .btn-secondary { background: var(--surface); color: #fff; }

        /* Grid de Categorias */
        .category-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .cat-card {
            background: var(--card);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid #222;
            text-align: left;
            cursor: pointer;
            transition: 0.2s;
        }
        .cat-card:hover { border-color: var(--primary); }
        .cat-icon { font-size: 24px; margin-bottom: 12px; display: block; }

        /* Itens de Lista */
        .list-item {
            background: var(--card);
            padding: 16px;
            border-radius: 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #222;
        }
        .best-deal { border-color: var(--primary); background: linear-gradient(145deg, #121212, #1a1500); }

        .price-badge { color: var(--primary); font-weight: 700; font-size: 14px; }
        
        .tab-bar {
            background: var(--card);
            padding: 20px;
            border-top: 1px solid #222;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .overlay {
            position: absolute;
            bottom: 0; left: 0; right: 0; top: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: flex-end;
            z-index: 100;
        }
        .bottom-sheet {
            background: var(--surface);
            width: 100%;
            padding: 32px 24px;
            border-radius: 24px 24px 0 0;
            transform: translateY(100%);
            transition: 0.3s;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="screen active" id="screen-start">
        <div class="header">
            <div class="logo-mark">⚡</div>
            <h1>Mercado<br>Fácil</h1>
            <p style="color: var(--text-secondary)">A inteligência logística para suas compras.</p>
        </div>
        <div class="input-group">
            <label>Seu Nome</label>
            <input type="text" id="userName" placeholder="Como quer ser chamado?">
        </div>
        <div class="btn" onclick="goTo('screen-home')" style="margin-top: auto">Começar compras</div>
    </div>

    <div class="screen" id="screen-home">
        <h2>Setores</h2>
        <div class="category-grid" id="category-grid"></div>
        <div style="margin-top: 20px">
            <div class="btn btn-secondary" onclick="goTo('screen-cart')">Ver Carrinho 🛒</div>
        </div>
    </div>

    <div class="screen" id="screen-products">
        <div onclick="goTo('screen-home')" style="margin-bottom: 20px; cursor:pointer">← Voltar</div>
        <h2 id="current-category-name">Categoria</h2>
        <div id="products-list"></div>
    </div>

    <div class="screen" id="screen-compare">
        <div onclick="goBackToProducts()" style="margin-bottom: 20px; cursor:pointer">← Voltar</div>
        <h2 id="current-product-name">Produto</h2>
        <div id="stores-list"></div>
    </div>

    <div class="screen" id="screen-cart">
        <div onclick="goTo('screen-home')" style="margin-bottom: 20px; cursor:pointer">← Voltar</div>
        <h2>Seu Carrinho</h2>
        <div id="cart-items" style="flex-grow: 1"></div>
        <div class="tab-bar" style="margin: 0 -24px -24px -24px; border-radius: 20px 20px 0 0">
            <div>
                <p style="color: var(--text-secondary); font-size: 12px">TOTAL</p>
                <p id="cart-total" style="font-size: 20px; font-weight: 800">R$ 0,00</p>
            </div>
            <div class="btn" style="padding: 12px 24px" onclick="openCheckout()">Finalizar</div>
        </div>
    </div>

    <div class="overlay" id="checkout-overlay">
        <div class="bottom-sheet" id="bottom-sheet">
            <h2>Confirmar Pedido</h2>
            <p style="color: var(--text-secondary); margin-bottom: 24px">Enviaremos sua lista para o nosso concierge via WhatsApp.</p>
            <div class="btn" style="background: var(--success); color: white" onclick="sendWhatsApp()">
                Confirmar via WhatsApp
            </div>
            <button onclick="closeCheckout()" style="background:none; border:none; color:white; width:100%; margin-top:16px; cursor:pointer">Cancelar</button>
        </div>
    </div>
</div>

<script>
    const database = {
        "Açougue": { icon: "🍖", items: { 
            "Picanha (kg)": { "Atacadão": 69.90, "Mercado Central": 74.50 },
            "Frango Inteiro": { "Atacadão": 18.90, "SuperBom": 16.50 },
            "Alcatra": { "Atacadão": 38.00, "Mercado Central": 36.90 }
        }},
        "Hortifrúti": { icon: "🥦", items: { 
            "Tomate": { "Atacadão": 5.40, "Mercado Central": 6.20 },
            "Banana Prata (kg)": { "Atacadão": 4.90, "SuperBom": 5.50 },
            "Batata Doce": { "Atacadão": 3.50, "Mercado Central": 3.20 }
        }},
        "Mercearia": { icon: "📦", items: { 
            "Arroz 5kg": { "Atacadão": 24.50, "SuperBom": 26.90 },
            "Feijão Preto": { "Atacadão": 7.80, "Mercado Central": 8.20 },
            "Óleo de Soja": { "Atacadão": 5.90, "SuperBom": 6.10 }
        }},
        "Padaria": { icon: "🥐", items: { "Pão Francês (kg)": { "Local": 14.00, "Central": 15.50 } }},
        "Frios": { icon: "🧀", items: { "Queijo Mussarela": { "Atacadão": 45.00, "SuperBom": 42.90 } }},
        "Bebidas": { icon: "🍺", items: { "Cerveja Lata": { "Atacadão": 3.50, "Central": 3.80 }, "Coca-Cola 2L": { "Atacadão": 8.90, "SuperBom": 9.20 } }},
        "Limpeza": { icon: "🧼", items: { "Sabão em Pó": { "Atacadão": 12.90, "SuperBom": 11.50 } }},
        "Higiene": { icon: "🪥", items: { "Creme Dental": { "Atacadão": 4.50, "SuperBom": 3.90 } }},
        "Mundo Pet": { icon: "🐶", items: { "Ração 10kg": { "Atacadão": 145.00, "Central": 152.00 } }},
        "Infantil": { icon: "🍼", items: { "Fralda G": { "Atacadão": 48.00, "Central": 52.00 } }},
        "Congelados": { icon: "❄️", items: { "Lasanha": { "Atacadão": 12.00, "SuperBom": 10.90 } }},
        "Bazar": { icon: "💡", items: { "Lâmpada LED": { "Atacadão": 8.90 } }},
        "Matinais": { icon: "☕", items: { "Café 500g": { "Atacadão": 16.00, "Central": 15.50 } }}
    };

    let cart = [];
    let activeCat = "";

    function goTo(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
        if(screenId === 'screen-home') renderHome();
    }

    function renderHome() {
        const grid = document.getElementById('category-grid');
        grid.innerHTML = "";
        Object.keys(database).forEach(cat => {
            grid.innerHTML += `
                <div class="cat-card" onclick="openCategory('${cat}')">
                    <span class="cat-icon">${database[cat].icon}</span>
                    <span style="font-weight:600">${cat}</span>
                </div>`;
        });
    }

    function openCategory(cat) {
        activeCat = cat;
        document.getElementById('current-category-name').innerText = cat;
        const list = document.getElementById('products-list');
        list.innerHTML = "";
        Object.keys(database[cat].items).forEach(item => {
            const prices = Object.values(database[cat].items[item]);
            const min = Math.min(...prices);
            list.innerHTML += `
                <div class="list-item" onclick="openCompare('${item}')">
                    <div>
                        <p style="font-weight:600">${item}</p>
                        <p style="color:var(--text-secondary); font-size:12px">A partir de R$ ${min.toFixed(2)}</p>
                    </div>
                    <span style="color:var(--primary)">➔</span>
                </div>`;
        });
        goTo('screen-products');
    }

    function openCompare(item) {
        document.getElementById('current-product-name').innerText = item;
        const list = document.getElementById('stores-list');
        list.innerHTML = "";
        const stores = database[activeCat].items[item];
        const minPrice = Math.min(...Object.values(stores));

        Object.keys(stores).forEach(store => {
            const price = stores[store];
            const isBest = price === minPrice;
            list.innerHTML += `
                <div class="list-item ${isBest ? 'best-deal' : ''}">
                    <div>
                        <p style="font-weight:600">${store}</p>
                        ${isBest ? '<p style="color:var(--primary); font-size:10px; font-weight:800">MELHOR PREÇO</p>' : ''}
                    </div>
                    <div style="text-align:right">
                        <p class="price-badge">R$ ${price.toFixed(2)}</p>
                        <button class="btn" style="padding:4px 12px; font-size:12px; margin-top:8px" onclick="addToCart('${item}', '${store}', ${price})">Adicionar</button>
                    </div>
                </div>`;
        });
        goTo('screen-compare');
    }

    function addToCart(p, s, v) {
        cart.push({p, s, v});
        renderCart();
        goTo('screen-cart');
    }

    function renderCart() {
        const list = document.getElementById('cart-items');
        list.innerHTML = "";
        let total = 0;
        cart.forEach((item, index) => {
            total += item.v;
            list.innerHTML += `
                <div class="list-item">
                    <div>
                        <p style="font-weight:600">${item.p}</p>
                        <p style="color:var(--text-secondary); font-size:12px">${item.s}</p>
                    </div>
                    <div style="text-align:right">
                        <p>R$ ${item.v.toFixed(2)}</p>
                        <p onclick="removeItem(${index})" style="color:#ff4444; font-size:12px; margin-top:4px">Remover</p>
                    </div>
                </div>`;
        });
        document.getElementById('cart-total').innerText = `R$ ${total.toFixed(2)}`;
    }

    function removeItem(idx) { cart.splice(idx, 1); renderCart(); }
    function goBackToProducts() { goTo('screen-products'); }
    
    function openCheckout() {
        document.getElementById('checkout-overlay').style.display = 'flex';
        setTimeout(() => document.getElementById('bottom-sheet').style.transform = 'translateY(0)', 10);
    }
    
    function closeCheckout() {
        document.getElementById('bottom-sheet').style.transform = 'translateY(100%)';
        setTimeout(() => document.getElementById('checkout-overlay').style.display = 'none', 300);
    }

    function sendWhatsApp() {
        const name = document.getElementById('userName').value || "Cliente";
        let msg = `*MERCADO FÁCIL - NOVO PEDIDO*\n`;
        msg += `Cliente: ${name}\n`;
        msg += `----------------------------\n`;
        cart.forEach(i => msg += `• ${i.p}\n  (${i.s}): R$ ${i.v.toFixed(2)}\n`);
        msg += `----------------------------\n`;
        msg += `*TOTAL ESTIMADO: ${document.getElementById('cart-total').innerText}*`;
        
        window.open(`https://wa.me/5522992777193?text=${encodeURIComponent(msg)}`);
    }
</script>
</body>
</html>
